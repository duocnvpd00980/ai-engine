<svg width="1376" height="768" viewBox="0 0 1376 768" xmlns="http://www.w3.org/2000/svg">
    
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;700;900&amp;display=swap');
            .text-base { font-family: 'Be Vietnam Pro', sans-serif; }
        </style>

        <!-- 🔥 Gradient overlay mềm hơn -->
        <linearGradient id="overlay" x1="0%" y1="0%" x2="65%" y2="0%">
            <stop offset="0%" stop-color="#000" stop-opacity="0.35"/>
            <stop offset="30%" stop-color="#000" stop-opacity="0.15"/>
            <stop offset="65%" stop-color="#000" stop-opacity="0"/>
        </linearGradient>

        <!-- 🔥 Glow theo màu brand -->
        <filter id="glow">
            <feGaussianBlur stdDeviation="8" result="blur"/>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>

    </defs>

    <!-- 🖼 Background -->
    <image href="{{ image_url }}" x="0" y="0" width="1376" height="768" preserveAspectRatio="xMidYMid slice" />

    <!-- 🌫 Overlay -->
    <rect width="1376" height="768" fill="url(#overlay)" />

    <!-- 📐 CONTENT -->
    <g transform="translate(80, 0)" class="text-base">

        <!-- 🏷 Brand -->
        <text x="0" y="100" font-size="28" fill="{{ accent_color }}" font-weight="700"
              style="letter-spacing: 4px; text-transform: uppercase;">
            {{ brand_name }}
        </text>

        <!-- 🧠 Main Title -->
        <text x="0" y="260" font-size="54" fill="white" font-weight="700"
              style="text-transform: uppercase;">
            {{ main_title }}
        </text>

        <!-- 🔥 Highlight -->
        <text x="0" y="390" font-size="80" fill="{{ accent_color }}" font-weight="900"
              filter="url(#glow)"
              style="text-transform: uppercase;">
            {{ highlight_text }}
        </text>

        <!-- 📝 Sub -->
        <text x="0" y="460" font-size="40" fill="white" font-weight="500" opacity="0.9">
            {{ sub_title }}
        </text>

        <!-- 🚀 CTA -->
        <g transform="translate(0, 540)">
            <rect width="300" height="56" rx="28" fill="{{ accent_color }}" />
            <text x="150" y="36" font-size="22" font-weight="900" fill="black" text-anchor="middle">
                {{ cta_text }}
            </text>
        </g>

    </g>

    <!-- 🧱 Border -->
    <rect x="20" y="20" width="1336" height="728"
          fill="none" stroke="{{ accent_color }}"
          stroke-width="1.5" opacity="0.25" />

</svg>