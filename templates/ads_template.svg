<svg width="1376" height="768" viewBox="0 0 1376 768" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;700;900&amp;display=swap');
            .text-base { font-family: 'Be Vietnam Pro', sans-serif; }
        </style>

        <linearGradient id="bg-overlay" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00150A" stop-opacity="0.95"/>
            <stop offset="100%" stop-color="#002B16" stop-opacity="0.8"/>
        </linearGradient>

        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="6" result="blur"/>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>

        <filter id="textShadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.5"/>
        </filter>
    </defs>

    <rect width="1376" height="768" fill="#05120B" />
    <rect width="1376" height="768" fill="url(#bg-overlay)" />

    <path d="M0 400 L300 350 L600 450 L900 200 L1200 300 L1376 150" stroke="#00FF88" stroke-width="2" fill="none" opacity="0.2" />

    <g transform="translate(100, 150)" class="text-base">
        
        <rect x="0" y="0" width="240" height="45" rx="4" fill="#00FF88" />
        <text x="120" y="31" font-size="24" font-weight="700" fill="#00150A" text-anchor="middle">Announcement</text>

        <g transform="translate(0, 110)" filter="url(#textShadow)">
            <text x="0" y="0" font-size="72" fill="white" font-weight="900" style="letter-spacing: -1px;">
                Revolutionary Automated
            </text>
            <text x="0" y="85" font-size="72" fill="white" font-weight="900">
                ExoTrade <tspan fill="#00FF88" filter="url(#glow)">Copy Trading</tspan>
            </text>
        </g>

        <g transform="translate(0, 260)">
            <text x="0" y="0" font-size="32" fill="white" font-weight="400" opacity="0.9">
                Start Copy Trading With 1 Click
            </text>
            <path d="M380 -5 L380 25 L390 18 L400 30 L405 28 L395 16 L405 16 Z" fill="white" transform="scale(1.2) translate(40, -10)"/>
        </g>
    </g>

    <g transform="translate(850, 400) rotate(-5)">
        <rect width="280" height="500" rx="30" fill="#1A1A1A" stroke="#333" stroke-width="8" />
        <rect x="15" y="60" width="250" height="80" rx="10" fill="#222" />
        <text x="30" y="105" font-size="14" fill="#00FF88" font-family="monospace">+9.92 USD</text>
    </g>

    <g transform="translate(1150, 50)">
        <path d="M0 0 L20 -10 L40 0 L40 20 L20 30 L0 20 Z" fill="#00FF88" />
        <text x="50" y="18" font-size="28" fill="white" font-weight="700">ExoTrade</text>
    </g>

</svg>
