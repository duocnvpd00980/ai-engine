<svg width="1376" height="768" viewBox="0 0 1376 768" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;700;900&amp;display=swap');
            .text-base { 
                font-family: 'Be Vietnam Pro', sans-serif; 
            }
        </style>

        <linearGradient id="shield" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#000000;stop-opacity:1" />
            <stop offset="30%" style="stop-color:#000000;stop-opacity:0.85" />
            <stop offset="50%" style="stop-color:#000000;stop-opacity:0.5" />
            <stop offset="100%" style="stop-color:#000000;stop-opacity:0" />
        </linearGradient>
        
        <filter id="neon_glow">
            <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <image href="{{ image_url }}" x="0" y="0" width="1376" height="768" preserveAspectRatio="xMidYMid slice" />

    <rect width="1376" height="768" fill="url(#shield)" />

    <g transform="translate(80, 0)" class="text-base"> 
        
        <text x="0" y="100" font-size="30" fill="{{ accent_color }}" font-weight="700" style="letter-spacing: 4px; text-transform: uppercase;">
            {{ brand_name }}
        </text>

        <text x="0" y="284" font-size="64" fill="white" font-weight="400" opacity="0.95" style="letter-spacing: 1px; text-transform: uppercase;">
            {{ main_title }}
        </text>

        <text x="0" y="410" font-size="120" fill="{{ accent_color }}" font-weight="900" 
              filter="url(#neon_glow)" 
              textLength="750" lengthAdjust="spacingAndGlyphs"
              style="text-transform: uppercase; letter-spacing: -2px;">
            {{ highlight_text }}
        </text>

        <text x="0" y="480" font-size="48" fill="white" font-weight="700" opacity="0.85">
            {{ sub_title }}
        </text>
        
        <g transform="translate(0, 530)">
            <rect width="280" height="48" rx="25" fill="{{ accent_color }}" />
            <text x="140" y="33" font-size="22" font-weight="900" fill="black" text-anchor="middle">
                XEM NGAY
            </text>
        </g>
    </g>

    <rect x="20" y="20" width="1336" height="728" fill="none" stroke="{{ accent_color }}" stroke-width="1.5" opacity="0.25" />
</svg>
