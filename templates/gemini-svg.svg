<svg width="1376" height="768" viewBox="0 0 1376 768" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
    <defs>
        <style type="text/css">
            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700;900&amp;display=swap');
            .brand-font { font-family: 'Inter', sans-serif; font-weight: 900; }
            .content-font { font-family: 'Inter', sans-serif; font-weight: 700; }
        </style>

        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="6" result="blur"/>
            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>
        
        <filter id="card-shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="15" stdDeviation="15" flood-opacity="0.5"/>
        </filter>

        <linearGradient id="overlay-grad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#000000" stop-opacity="0.8" />
            <stop offset="50%" stop-color="#000000" stop-opacity="0.2" />
            <stop offset="100%" stop-color="#000000" stop-opacity="0.6" />
        </linearGradient>
    </defs>

    <rect width="1376" height="768" fill="#00120a" />
    {% if image_url %}
    <image xlink:href="{{ image_url }}" href="{{ image_url }}" width="1376" height="768" preserveAspectRatio="xMidYMid slice" />
    {% endif %}
    <rect width="1376" height="768" fill="url(#overlay-grad)" />

    <g transform="translate(80, 120)">
        <rect width="180" height="34" rx="17" fill="{{ accent_color }}" />
        <text x="90" y="23" class="brand-font" font-size="14" fill="#000" text-anchor="middle" style="letter-spacing: 1px;">{{ badge_text }}</text>

        <foreignObject x="0" y="60" width="750" height="300">
            <div xmlns="http://www.w3.org/1999/xhtml" style="color: white; font-family: 'Inter'; font-weight: 900; font-size: 72px; line-height: 1.1; text-transform: uppercase;">
                {{ main_title }} <br/>
                <span style="color: {{ accent_color }}; filter: drop-shadow(0 0 10px {{ accent_color }}44);">{{ highlight_text }}</span>
            </div>
        </foreignObject>

        <foreignObject x="0" y="320" width="600" height="120">
            <div xmlns="http://www.w3.org/1999/xhtml" style="color: rgba(255,255,255,0.8); font-family: 'Inter'; font-weight: 500; font-size: 26px; line-height: 1.5;">
                {{ sub_title }}
            </div>
        </foreignObject>

        <g transform="translate(0, 480)">
            <rect width="280" height="70" rx="35" fill="{{ accent_color }}" filter="url(#glow)" />
            <text x="120" y="44" class="brand-font" font-size="24" fill="#000">{{ cta_text }}</text>
            <path d="M210 25 L230 35 L210 45 Z" fill="#000" /> </g>
    </g>

    <g transform="translate(900, 150) rotate(-4)">
        <rect width="380" height="520" rx="40" fill="#0a2a1e" stroke="{{ accent_color }}" stroke-width="2" opacity="0.9" filter="url(#card-shadow)" />
        
        <g transform="translate(-60, 100) rotate(6)">
            <rect width="320" height="100" rx="20" fill="#123d2b" filter="url(#card-shadow)" />
            <rect x="20" y="25" width="50" height="50" rx="25" fill="{{ accent_color }}" opacity="0.2" />
            <path d="M35 55 L45 35 L55 55 Z" fill="{{ accent_color }}" transform="translate(-2, 2)"/> <text x="85" y="45" class="content-font" font-size="16" fill="rgba(255,255,255,0.6)">Profit Growth</text>
            <text x="85" y="75" class="brand-font" font-size="28" fill="{{ accent_color }}">{{ stats_value }}</text>
        </g>

        <g transform="translate(80, 280) rotate(-2)">
            <rect width="320" height="100" rx="20" fill="#0f1f18" filter="url(#card-shadow)" stroke="rgba(255,255,255,0.1)" />
            <text x="25" y="40" class="content-font" font-size="14" fill="rgba(255,255,255,0.5)">Recently Closed</text>
            <text x="25" y="70" class="brand-font" font-size="20" fill="white">BTC/USDT Order</text>
            <text x="240" y="70" class="brand-font" font-size="20" fill="{{ accent_color }}">+12.5%</text>
        </g>
    </g>

    <g transform="translate(1100, 50)">
        {% if logo_url %}
            <image xlink:href="{{ logo_url }}" href="{{ logo_url }}" width="200" height="60" preserveAspectRatio="xMidYMid meet" />
        {% else %}
            <text x="0" y="30" class="brand-font" font-size="28" fill="white">{{ brand_name }}</text>
        {% endif %}
    </g>
</svg>
