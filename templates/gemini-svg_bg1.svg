<svg width="1376" height="768" viewBox="0 0 1376 768" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
    <defs>
        <style type="text/css">
            @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@500;900&amp;display=swap');
            
            text, tspan {
                font-family: 'Roboto', sans-serif;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }
            .roboto-500 { font-family: 'Roboto', sans-serif; font-weight: 500; }
            .roboto-900 { font-family: 'Roboto', sans-serif; font-weight: 900; }
        </style>

        <filter id="glow-strong" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="5" result="blur"/>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>

        <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#001a0f" />
            <stop offset="100%" stop-color="#000000" />
        </linearGradient>
    </defs>

    <rect width="1376" height="768" fill="url(#bg-grad)" />
    {% if image_url %}
    <image xlink:href="{{ image_url }}" href="{{ image_url }}" width="1376" height="768" preserveAspectRatio="xMidYMid slice" opacity="0.5"/>
    {% endif %}
    
    <g transform="translate(100, 140)">
        <g>
            <rect width="210" height="42" rx="4" fill="{{ accent_color }}" />
            <text x="105" y="28" class="roboto-900" font-size="20" fill="#001a0f" text-anchor="middle" style="letter-spacing: 0.5px;">
                {{ badge_text }}
            </text>
        </g>

        <g transform="translate(0, 120)">
            <text x="0" y="0" class="roboto-900" font-size="78" fill="white" style="letter-spacing: -1px;">
                {{ main_title }}
            </text>
            <text x="0" y="85" class="roboto-900" font-size="78" fill="{{ accent_color }}" filter="url(#glow-strong)" style="letter-spacing: -1px;">
                {{ highlight_text }}
            </text>
        </g>

        <text x="0" y="290" class="roboto-500" font-size="36" fill="white" opacity="0.9">
            {{ sub_title }}
        </text>

        <g transform="translate(0, 350)">
            <text x="0" y="0" class="roboto-500" font-size="30" fill="white" opacity="0.8">
                {{ cta_text }}
            </text>
            <path d="M190 -10 L190 22 L202 14 L214 28 L222 24 L210 10 L222 10 Z" fill="white" transform="translate(15, 5)"/>
        </g>
    </g>

    <g transform="translate(1050, 60)">
        {% if logo_url %}
            <image xlink:href="{{ logo_url }}" href="{{ logo_url }}" width="220" height="80" preserveAspectRatio="xMidYMid meet" />
        {% else %}
            <path d="M0 0 L25 -12 L50 0 L50 25 L25 37 L0 25 Z" fill="{{ accent_color }}" />
            <text x="65" y="22" class="roboto-900" font-size="32" fill="white">{{ brand_name }}</text>
        {% endif %}
    </g>

    <g transform="translate(900, 420) rotate(-6)">
        <rect width="360" height="480" rx="30" fill="#051a11" stroke="{{ accent_color }}" stroke-width="1" opacity="0.8" />
        <rect x="30" y="50" width="300" height="70" rx="10" fill="#123d2b" />
        <text x="50" y="92" class="roboto-900" font-size="22" fill="{{ accent_color }}">{{ stats_value }}</text>
    </g>
</svg>
